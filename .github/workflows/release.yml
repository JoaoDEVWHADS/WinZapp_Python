name: Release Build

on:
  release:
    types: [created]

env:
  NODE_VERSION: "24.15.0"
  PYTHON_VERSION: "3.13"

jobs:
  build:
    name: Build Windows installer and portable ZIP
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # GCC and windres (from UCRT64 binutils) are required by build.py to compile
      # the C installer/uninstaller.  The opus package provides libopus-0.dll.
      - name: Set up MSYS2 (GCC + windres + opus)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-binutils
            mingw-w64-ucrt-x86_64-opus

      # Locate the UCRT64 bin directory dynamically (no hard-coded MSYS2 path).
      # Searching for gcc.exe is more reliable than assuming C:\msys64 — the
      # runner layout can vary between GitHub-hosted runner image versions.
      - name: Add MSYS2 UCRT64 bin to Windows PATH
        run: |
          $candidates = @(
            "C:\msys64\ucrt64\bin",
            "C:\msys2\ucrt64\bin",
            "C:\tools\msys64\ucrt64\bin",
            "C:\tools\msys2\ucrt64\bin"
          )
          $ucrt64bin = $candidates | Where-Object { Test-Path "$_\gcc.exe" } | Select-Object -First 1
          if (-not $ucrt64bin) {
            Write-Error "MSYS2 UCRT64 bin not found (gcc.exe missing in all candidate paths)."
            exit 1
          }
          Write-Host "Found MSYS2 UCRT64 bin: $ucrt64bin"
          echo $ucrt64bin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Copy libopus-0.dll using the MSYS2 shell so that /ucrt64/bin/ is always
      # the correct path regardless of where MSYS2 is installed on Windows.
      - name: Copy libopus-0.dll to client/lib
        shell: msys2 {0}
        run: |
          mkdir -p client/lib
          cp /ucrt64/bin/libopus-0.dll client/lib/libopus-0.dll
          echo "Copied libopus-0.dll: $(stat -c%s client/lib/libopus-0.dll) bytes"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # build.py expects client/node/node.exe — download the same portable ZIP
      # version that developers use and place it at the right path.
      - name: Download portable Node.js v${{ env.NODE_VERSION }}
        run: |
          $version = "${{ env.NODE_VERSION }}"
          $zip = "node-v${version}-win-x64.zip"
          Invoke-WebRequest "https://nodejs.org/dist/v${version}/${zip}" -OutFile $zip -UseBasicParsing
          Expand-Archive $zip -DestinationPath . -Force
          Move-Item "node-v${version}-win-x64" "client\node"

      - name: Create Python venv and install dependencies
        run: |
          python -m venv venv
          venv\Scripts\pip install --upgrade pip --quiet
          venv\Scripts\pip install -r requirements-dev.txt --quiet
          venv\Scripts\pip install -r requirements.txt --quiet

      # Cache node_modules to avoid re-downloading hundreds of packages on every run.
      # setup_api.py preserves node_modules across clones (moves/restores the folder),
      # so this cache survives the WPPConnect Server re-clone in the next step.
      - name: Cache API node_modules
        uses: actions/cache@v4
        with:
          path: client/api/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('client/api/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # Clones the WPPConnect Server repo into client/api/ and restores
      # WinZapp's custom files (start.js, package.json, config.json, src patches).
      - name: Set up WPPConnect Server
        run: venv\Scripts\python.exe setup_api.py

      # Install JS dependencies and compile TypeScript → dist/server.js.
      # PUPPETEER_SKIP_DOWNLOAD skips the ~680 MB Chrome download — the app
      # downloads Chrome on the user's machine during first-run setup instead.
      - name: Install API dependencies and build
        env:
          PUPPETEER_SKIP_DOWNLOAD: "1"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "1"
        run: |
          $node = "$env:GITHUB_WORKSPACE\client\node\node.exe"
          $npm  = "$env:GITHUB_WORKSPACE\client\node\node_modules\npm\bin\npm-cli.js"

          Set-Location "$env:GITHUB_WORKSPACE\client\api"

          & $node $npm install --no-audit --no-fund --legacy-peer-deps

          # Run Prisma generate only if the package defines the script
          $scripts = (Get-Content "package.json" | ConvertFrom-Json).scripts
          if ($null -ne $scripts.'db:generate') {
            & $node $npm run db:generate
          }

          & $node $npm run build

      # Runs all 8 build steps: PyInstaller → staging → C installer/uninstaller → ZIP.
      - name: Build WinZapp
        run: venv\Scripts\python.exe build.py

      # Sanity-check that the portable ZIP contains the expected directories.
      # A missing sounds/ or lib/ entry means the staging step silently failed.
      - name: Verify dist/WinZapp.zip contents
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("dist\WinZapp.zip")
          try {
            $entries = $zip.Entries | ForEach-Object { $_.FullName }
            $hasSounds   = ($entries | Where-Object { $_ -like "WinZapp/sounds/*" }).Count -gt 0
            $hasLib      = ($entries | Where-Object { $_ -like "WinZapp/lib/bass.dll" }).Count -gt 0
            $hasOpus     = ($entries | Where-Object { $_ -like "WinZapp/lib/libopus-0.dll" }).Count -gt 0
            $hasExe      = ($entries | Where-Object { $_ -eq   "WinZapp/WinZapp.exe" }).Count -gt 0
            Write-Host "WinZapp.exe : $hasExe"
            Write-Host "sounds/*    : $hasSounds"
            Write-Host "lib/bass.dll: $hasLib"
            Write-Host "lib/libopus : $hasOpus"
            if (-not ($hasSounds -and $hasLib -and $hasOpus -and $hasExe)) {
              Write-Error "dist/WinZapp.zip is missing required entries — build failed."
              exit 1
            }
          } finally {
            $zip.Dispose()
          }

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/WinZappInstaller.exe
            dist/WinZapp.zip
